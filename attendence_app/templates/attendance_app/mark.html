<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #dbeafe, #eef2ff, #f8fafc);
            font-family: 'Segoe UI', sans-serif;
            padding: 40px 0;
        }

        .attendance-card {
            background: rgba(255, 255, 255, 0.96);
            border: none;
            border-radius: 26px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.10);
            overflow: hidden;
        }

        .attendance-card .card-body {
            padding: 35px 30px;
        }

        .page-title {
            text-align: center;
            font-size: 48px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 30px;
        }

        .table {
            margin-bottom: 0;
            border-radius: 20px;
            overflow: hidden;
        }

        .table thead th {
            background: linear-gradient(135deg, #0f172a, #1f2937);
            color: white;
            text-align: center;
            vertical-align: middle;
            border: none;
            padding: 16px 12px;
            font-size: 17px;
            font-weight: 700;
        }

        .table tbody td {
            vertical-align: middle;
            text-align: center;
            padding: 18px 12px;
            font-size: 16px;
            color: #1f2937;
            border-color: #e5e7eb;
        }

        .table tbody tr:hover {
            background: #f8fbff;
            transition: 0.2s ease;
        }

        .status-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .status-option {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            padding: 8px 14px;
            border-radius: 12px;
            transition: 0.25s ease;
        }

        .status-option:hover {
            background: #eff6ff;
            border-color: #93c5fd;
        }

        .form-check-input {
            width: 18px;
            height: 18px;
            margin-top: 0;
            cursor: pointer;
        }

        .form-check-label {
            font-weight: 600;
            color: #374151;
            cursor: pointer;
            margin-bottom: 0;
        }

        .btn-save {
            background: #16a34a;
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
        }

        .btn-save:hover {
            background: #15803d;
            color: white;
        }

        .btn-back {
            background: #6b7280;
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
        }

        .btn-back:hover {
            background: #374151;
            color: white;
        }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        .empty-row {
            color: #6b7280;
            font-weight: 500;
            padding: 25px 0;
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 34px;
            }

            .attendance-card .card-body {
                padding: 20px 15px;
            }

            .table thead th,
            .table tbody td {
                font-size: 14px;
                padding: 12px 8px;
            }

            .status-group {
                gap: 10px;
            }

            .status-option {
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card attendance-card">
        <div class="card-body">
            <h2 class="page-title">Mark Attendance</h2>

            <form method="POST">
                {% csrf_token %}

                <div class="table-responsive">
                    <table class="table table-bordered align-middle">
                        <thead>
                            <tr>
                                <th>Roll</th>
                                <th>Name</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for s in students %}
                            <tr>
                                <td>{{ s.roll }}</td>
                                <td>{{ s.name }}</td>
                                <td>
                                    <div class="status-group">
                                        <div class="status-option">
                                            <input class="form-check-input" type="radio" name="status_{{ s.roll }}" value="Present" id="present_{{ s.roll }}">
                                            <label class="form-check-label" for="present_{{ s.roll }}">
                                                Present
                                            </label>
                                        </div>

                                        <div class="status-option">
                                            <input class="form-check-input" type="radio" name="status_{{ s.roll }}" value="Absent" id="absent_{{ s.roll }}">
                                            <label class="form-check-label" for="absent_{{ s.roll }}">
                                                Absent
                                            </label>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            {% empty %}
                            <tr>
                                <td colspan="3" class="empty-row">No students found</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>

                <div class="action-bar">
                    <button type="submit" class="btn btn-save">Save Attendance</button>
                    <a href="/attendance/" class="btn btn-back">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
