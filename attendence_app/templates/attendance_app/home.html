<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Module</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #dbeafe, #eef2ff, #f8fafc);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-card {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .title {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1f2937;
        }

        .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 30px;
        }

        .btn-custom {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .btn-primary {
            background: #2563eb;
            border: none;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #16a34a;
            border: none;
        }

        .btn-success:hover {
            background: #15803d;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6b7280;
            border: none;
        }

        .btn-secondary:hover {
            background: #374151;
            transform: translateY(-2px);
        }

        .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 20px 0;
        }
    </style>
</head>

<body>

<div class="main-card">

    <div class="title">📊 Attendance Module</div>

    <div class="subtitle">
        Mark and track student attendance
    </div>

    <a href="/attendance/mark/" class="btn btn-primary btn-custom">
        📝 Mark Attendance
    </a>

    <a href="/attendance/view/" class="btn btn-success btn-custom">
        📋 View Attendance
    </a>

    <div class="divider"></div>

    <a href="/" class="btn btn-secondary btn-custom">
        ⬅ Back to Dashboard
    </a>

</div>

</body>
</html>
