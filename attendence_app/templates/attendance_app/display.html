<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #dbeafe, #eef2ff, #f8fafc);
            font-family: 'Segoe UI', sans-serif;
            padding: 40px 0;
        }

        .card-box {
            max-width: 950px;
            margin: auto;
            border-radius: 25px;
            overflow: hidden;
            border: none;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .title {
            text-align: center;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 25px;
            color: #0f172a;
        }

        .table {
            margin-bottom: 0;
            border-radius: 15px;
            overflow: hidden;
        }

        .table thead th {
            background: linear-gradient(135deg, #0f172a, #1f2937);
            color: white;
            text-align: center;
            padding: 16px;
            font-size: 17px;
            border: none;
        }

        .table tbody td {
            text-align: center;
            vertical-align: middle;
            padding: 16px;
            font-size: 15px;
            color: #1f2937;
        }

        .table tbody tr:hover {
            background: #f1f5ff;
            transition: 0.2s;
        }

        .status-present {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
        }

        .status-absent {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
        }

        .btn-back {
            background: #6b7280;
            color: white;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
        }

        .btn-back:hover {
            background: #374151;
            color: white;
        }

        .empty-row {
            padding: 20px;
            color: #6b7280;
            font-weight: 500;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .badge-date {
            background: #e0e7ff;
            color: #3730a3;
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 30px;
            }

            .table thead th,
            .table tbody td {
                font-size: 13px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card card-box">
        <div class="card-body p-4">

            <div class="title">📊 Attendance List</div>

            <div class="table-responsive">
                <table class="table table-bordered align-middle">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for d in data %}
                        <tr>
                            <td>{{ d.student }}</td>
                            <td>
                                <span class="badge-date">{{ d.date }}</span>
                            </td>
                            <td>
                                {% if d.status == "Present" %}
                                    <span class="status-present">✔ {{ d.status }}</span>
                                {% else %}
                                    <span class="status-absent">✖ {{ d.status }}</span>
                                {% endif %}
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="3" class="empty-row">No attendance records found</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

            <div class="text-center mt-4">
                <a href="{% url 'home' %}" class="btn btn-back">⬅ Back to Dashboard</a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
