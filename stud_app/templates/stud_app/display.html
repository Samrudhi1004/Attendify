<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #dbeafe, #eef2ff, #f8fafc);
            font-family: 'Segoe UI', sans-serif;
            padding: 40px 0;
        }

        .page-title {
            text-align: center;
            font-size: 48px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 30px;
        }

        .table-card {
            background: white;
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .table-card .card-body {
            padding: 25px;
        }

        .table {
            margin-bottom: 0;
            overflow: hidden;
            border-radius: 18px;
        }

        .table thead th {
            background: linear-gradient(135deg, #0f172a, #1f2937);
            color: white;
            text-align: center;
            vertical-align: middle;
            border: none;
            padding: 16px 12px;
            font-size: 17px;
        }

        .table tbody td {
            vertical-align: middle;
            text-align: center;
            padding: 16px 12px;
            font-size: 16px;
            color: #1f2937;
        }

        .table tbody tr:hover {
            background-color: #f8fbff;
            transition: 0.2s ease;
        }

        .btn-action {
            border-radius: 10px;
            padding: 8px 16px;
            font-weight: 600;
            border: none;
        }

        .btn-edit {
            background: #facc15;
            color: #111827;
        }

        .btn-edit:hover {
            background: #eab308;
            color: #111827;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
        }

        .btn-delete:hover {
            background: #dc2626;
            color: white;
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-add {
            background: #2563eb;
            color: white;
            font-weight: 600;
            border-radius: 12px;
            padding: 10px 18px;
            border: none;
            text-decoration: none;
        }

        .btn-add:hover {
            background: #1d4ed8;
            color: white;
        }

        .btn-back {
            background: #6b7280;
            color: white;
            font-weight: 600;
            border-radius: 12px;
            padding: 10px 18px;
            border: none;
            text-decoration: none;
        }

        .btn-back:hover {
            background: #374151;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #6b7280;
            font-size: 18px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 34px;
            }

            .table-card .card-body {
                padding: 15px;
            }

            .table thead th,
            .table tbody td {
                font-size: 14px;
                padding: 12px 8px;
            }

            .btn-action {
                padding: 6px 10px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1 class="page-title">Display All Students</h1>

        <div class="top-actions">
            <a href="/student/insert-one/" class="btn-add">+ Add Student</a>
            <a href="/student/" class="btn-back">← Back to Student Module</a>
        </div>

        <div class="card table-card">
            <div class="card-body">

                {% if students %}
                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Roll</th>
                                <th>Name</th>
                                <th>Subject</th>
                                <th>Marks</th>
                                <th>Actions</th>
                            </tr>
                        </thead>

                        <tbody>
                            {% for s in students %}
                            <tr>
                                <td>{{ s.roll }}</td>
                                <td>{{ s.name }}</td>
                                <td>{{ s.subject }}</td>
                                <td>{{ s.marks }}</td>
                                <td>
                                    <a href="{% url 'student:update_student' s.roll %}" class="btn btn-action btn-edit btn-sm me-2">Edit</a>
                                    <a href="{% url 'student:delete_student' s.roll %}" class="btn btn-action btn-delete btn-sm">Delete</a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
                {% else %}
                    <div class="empty-state">
                        No students found.
                    </div>
                {% endif %}

            </div>
        </div>

    </div>
</body>
</html>
