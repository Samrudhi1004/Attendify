<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insert Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #dbeafe, #eef2ff, #f8fafc);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-card {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 35px 30px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 25px;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px;
        }

        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 0.2rem rgba(37,99,235,0.2);
        }

        .btn-submit {
            width: 100%;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            background: #16a34a;
            border: none;
        }

        .btn-submit:hover {
            background: #15803d;
            transform: translateY(-2px);
        }

        .btn-back {
            width: 100%;
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="form-card">

    <div class="title">➕ Insert Student</div>

    <form action="/student/insert-one/" method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Roll No</label>
            <input type="text" name="roll" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Subject</label>
            <input type="text" name="subject" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Marks</label>
            <input type="number" name="marks" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-submit">Submit</button>

    </form>

    <a href="/student/" class="btn btn-secondary btn-back">⬅ Back</a>

</div>

</body>
</html>
