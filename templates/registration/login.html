{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATTENDIFY</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #dbeafe, #eff6ff, #f8fafc);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .bg-shape-1,
        .bg-shape-2,
        .bg-shape-3 {
            position: absolute;
            border-radius: 50%;
            filter: blur(10px);
            z-index: 0;
        }

        .bg-shape-1 {
            width: 220px;
            height: 220px;
            background: rgba(37, 99, 235, 0.15);
            top: 60px;
            left: 120px;
        }

        .bg-shape-2 {
            width: 180px;
            height: 180px;
            background: rgba(59, 130, 246, 0.12);
            bottom: 80px;
            right: 140px;
        }

        .bg-shape-3 {
            width: 120px;
            height: 120px;
            background: rgba(96, 165, 250, 0.18);
            top: 140px;
            right: 280px;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
        }

        .brand-top {
            text-align: center;
            margin-bottom: 18px;
        }

        .brand-badge {
            width: 72px;
            height: 72px;
            margin: 0 auto 12px;
            border-radius: 20px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.28);
        }

        .brand-name {
            font-size: 30px;
            font-weight: 800;
            color: #1e3a8a;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .brand-tagline {
            font-size: 14px;
            color: #64748b;
        }

        .login-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            text-align: center;
            padding: 28px 20px;
            position: relative;
        }

        .login-header::after {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.10);
            border-radius: 50%;
            top: -35px;
            right: -35px;
        }

        .login-header h2 {
            margin: 0;
            font-weight: 700;
            font-size: 24px;
            position: relative;
            z-index: 1;
        }

        .login-header p {
            margin-top: 8px;
            margin-bottom: 0;
            font-size: 14px;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }

        .login-body {
            padding: 30px;
        }

        .form-label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-group-text {
            border-radius: 12px 0 0 12px;
            background: #eff6ff;
            border: 1px solid #dbeafe;
            color: #2563eb;
        }

        .form-control {
            border-radius: 0 12px 12px 0;
            padding: 12px;
            border: 1px solid #dbeafe;
            background: #f8fbff;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.16);
            border-color: #2563eb;
            background: white;
        }

        .btn-login {
            width: 100%;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
            transition: 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 24px rgba(37, 99, 235, 0.24);
        }

        .footer-text {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #64748b;
        }

        .footer-text span {
            font-weight: 700;
            color: #2563eb;
        }

        .secure-note {
            text-align: center;
            margin-top: 8px;
            font-size: 13px;
            color: #94a3b8;
        }

        .error-box {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="bg-shape-1"></div>
    <div class="bg-shape-2"></div>
    <div class="bg-shape-3"></div>

    <div class="login-wrapper">

        <div class="brand-top">
            <div class="brand-badge">
               <img src="{% static 'images/logo.png' %}" alt="logo" class="logo-img">
            </div>
            <div class="brand-name">ATTENDIFY</div>
            <div class="brand-tagline">Smart attendance and student management portal</div>
        </div>

        <div class="card login-card">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Login to access your dashboard</p>
            </div>

            <div class="login-body">
                {% if form.errors %}
                    <div class="error-box">
                        Invalid username or password.
                    </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                            <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter username" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="id_password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter password" required>
                        </div>
                    </div>

                    {% if next %}
                        <input type="hidden" name="next" value="{{ next }}">
                    {% endif %}

                    <button type="submit" class="btn btn-primary btn-login">Login</button>
                </form>

                <div class="footer-text">
                    Powered by <span>ATTENDIFY</span>
                </div>

                <div class="secure-note">
                    <i class="bi bi-shield-lock-fill"></i> Secure Access Portal
                </div>
            </div>
        </div>
    </div>

</body>
</html>
